<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produto - Manas</title>
  <link href="./output.css" rel="stylesheet">
  <!-- Swiper.js CSS -->
  <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />

  <style>
    .fade-in-section {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease-out, transform 0.6s ease-out;
    }
    .fade-in-section.is-visible {
      opacity: 1;
      transform: translateY(0);
    }
    /* Custom styles for Swiper navigation buttons to be visible */
    .swiper-button-prev, .swiper-button-next {
      color: var(--color-indigo-600); /* Using Tailwind's indigo-600 color variable */
    }
    .product-thumb-slider .swiper-slide-thumb-active {
      border-color: var(--color-indigo-600);
    }
    #cart-counter.hidden {
      display: none;
    }
    #cart-counter {
      min-width: 1.25rem; /* h-5 */
      height: 1.25rem; /* w-5 */
      font-size: 0.75rem; /* text-xs */
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- NAVBAR -->
  <header class="bg-white shadow-md sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 py-5 flex justify-between items-center">

      <a href="index.html"><img src="img/logomanas.png" class="h-14 w-full"></a>

      <!-- Desktop Menu -->
      <nav id="main-nav" class="hidden md:flex md:items-center gap-6 font-medium w-full md:w-auto bg-white md:bg-transparent p-8 md:p-0 shadow-md md:shadow-none md:relative absolute top-full left-0">
        <!-- Menu items will be inserted here by JS -->
      </nav>

      <div class="flex items-center gap-4 text-xl">
        <button id="open-search-btn" class="hover:text-indigo-600 cursor-pointer" aria-label="Buscar produtos"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" /><path d="M21 21l-6 -6" /></svg></button>
        <a href="profile.html" class="hover:text-indigo-600 cursor-pointer" aria-label="Minha conta"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0" /><path d="M6 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2" /></svg></a>
        <a href="cart.html" class="relative hover:text-indigo-600 cursor-pointer" aria-label="Carrinho de compras">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M6 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" /><path d="M17 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" /><path d="M17 17h-11v-14h-2" /><path d="M6 5l14 1l-1 7h-13" /></svg>
          <span id="cart-counter" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full flex items-center justify-center hidden">0</span>
        </a>

        <!-- Mobile Menu Button -->
        <button id="mobile-menu-button" class="md:hidden cursor-pointer" aria-label="Abrir menu" aria-controls="main-nav" aria-expanded="false">
          <svg id="menu-icon-open" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
          </svg>
          <svg id="menu-icon-close" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

    </div>
  <!-- Search Overlay -->
  <div id="search-overlay" class="fixed inset-0 bg-black/50 z-50 hidden items-start md:items-center justify-center pt-20 md:pt-0">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md relative mx-4">
      <button id="close-search-btn" class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 cursor-pointer" aria-label="Fechar busca">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
      <h3 class="text-2xl font-bold mb-4">Buscar Produtos</h3>
      <div class="flex">
        <input type="text" id="search-input" placeholder="O que você procura?" class="flex-1 p-3 border border-gray-300 rounded-l-lg focus:outline-none focus:ring-2 focus:ring-indigo-600">
        <button id="search-submit-btn" class="bg-indigo-600 text-white px-6 py-3 rounded-r-lg hover:bg-indigo-700 transition-colors cursor-pointer">Buscar</button>
      </div>
    </div>
  </div>
  </header>
  <!-- PRODUCT DETAILS SECTION -->
  <section id="product-details-container" class="w-full md:max-w-7xl mx-auto px-4 py-16 fade-in-section">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
      <!-- Product Image Gallery -->
      <div>
        <!-- Main Product Image Swiper -->
        <div class="swiper product-main-slider rounded-xl shadow-lg mb-4 w-full">
          <div id="product-main-images" class="swiper-wrapper">
            <!-- Main images will be inserted here by JS -->
          </div>
          <!-- Add Navigation -->
          <div class="swiper-button-prev"></div>
          <div class="swiper-button-next"></div>
        </div>

        <!-- Product Thumbnails Swiper -->
        <div class="swiper product-thumb-slider mt-2">
          <div id="product-thumb-images" class="swiper-wrapper">
            <!-- Thumbnail images will be inserted here by JS -->
          </div>
        </div>
      </div>

      <!-- Product Info -->
      <div>
        <h1 id="product-name" class="text-3xl md:text-4xl font-bold mb-4"></h1>
        <div id="product-price" class="text-2xl font-bold mb-6"></div>
        <div id="product-stock" class="text-sm text-indigo-600 mb-6"></div>
        <p id="product-description" class="text-gray-700 mb-6 leading-relaxed"></p>

        <!-- Options -->
        <div id="size-option-container" class="mb-6 hidden">
          <label for="size" class="block text-lg font-semibold mb-2">Tamanho:</label>
          <select id="size-select" class="w-full md:w-1/2 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-600"></select>
        </div>

        <div class="mb-6">
          <label for="quantity" class="block text-lg font-semibold mb-2">Quantidade:</label>
          <input type="number" id="quantity" value="1" min="1" class="w-20 p-3 border border-gray-300 rounded-lg text-center focus:outline-none focus:ring-2 focus:ring-indigo-600">
        </div>

        <button id="add-to-cart-btn" class="w-full bg-indigo-600 text-white text-lg font-semibold py-3 rounded-lg hover:bg-indigo-700 transition-colors cursor-pointer">
          Adicionar ao Carrinho
        </button>
      </div>
    </div>
  </section>

  <!-- RELATED PRODUCTS SECTION -->
  <section id="related-products-section" class="bg-white py-16 fade-in-section">
    <div class="max-w-7xl mx-auto px-4">
      <h3 class="text-2xl md:text-3xl font-bold text-center mb-10">
        Produtos Relacionados
      </h3>
      <div id="related-products-list" class="grid grid-cols-2 md:grid-cols-4 gap-8">
        <!-- Related products will be inserted here by JS -->
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="bg-gray-900 text-gray-400 py-16 fade-in-section">
    <div class="max-w-7xl mx-auto px-4 grid md:grid-cols-4 gap-10">
      <div>
        <img src="img/logomanas-branco.png" class="w-40">
        <p>Universo Feminino</p>
      </div>
      <div>
        <h4 class="text-white font-bold mb-3">Categorias</h4>
        <ul id="footer-categories" class="space-y-2">
          <!-- Footer categories will be inserted here by JS -->
        </ul>
      </div>
      <div>
        <h4 class="text-white font-bold mb-3">Suporte</h4>
        <ul id="footer-support" class="space-y-2">
          <!-- Footer support links will be inserted here by JS -->
        </ul>
      </div>
      <div>
        <h4 class="text-white font-bold mb-3">Pagamentos</h4>
        <p>Pix • Cartão • Dinheiro</p>
      </div>
    </div>
    <div class="text-center mt-16 pt-10 border-t border-gray-800 text-sm">
      © 2026 MaNas - Universo Feminino
    </div>
  </footer>

  <!-- Floating Action Buttons -->
  <div class="fixed bottom-4 right-4 z-20 flex flex-col gap-3">
    <!-- WhatsApp Button -->
    <a href="https://wa.me/5541000000000?text=Olá!%20Gostaria%20de%20tirar%20uma%20dúvida." target="_blank" class="bg-green-500 text-white h-14 w-14 rounded-full flex items-center justify-center shadow-lg hover:bg-green-600 transition-colors cursor-pointer" aria-label="Contato via WhatsApp">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 24 24" fill="currentColor">
        <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.894 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.89-5.451 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01s-.521.074-.792.372c-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.626.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/>
      </svg>
    </a>
    <!-- Back to Top Button -->
    <button id="back-to-top-btn" class="bg-indigo-600 text-white h-14 w-14 rounded-full flex items-center justify-center shadow-lg hover:bg-indigo-700 transition-all cursor-pointer">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
      </svg>
    </button>
  </div>

  <!-- Swiper.js JS -->
  <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>

  <script>
    // Mobile Menu Toggle
    const menuButton = document.getElementById('mobile-menu-button');
    const navMenu = document.getElementById('main-nav');
    const openIcon = document.getElementById('menu-icon-open');
    const closeIcon = document.getElementById('menu-icon-close');

    if (menuButton && navMenu && openIcon && closeIcon) {
      menuButton.addEventListener('click', () => {
        const isExpanded = menuButton.getAttribute('aria-expanded') === 'true';
        menuButton.setAttribute('aria-expanded', !isExpanded);
        navMenu.classList.toggle('hidden');
        openIcon.classList.toggle('hidden');
        closeIcon.classList.toggle('hidden');
      });
    }

    // Animate on Scroll
    const sectionsToAnimate = document.querySelectorAll('.fade-in-section');
    const observerOptions = {
      root: null,
      rootMargin: '0px',
      threshold: 0.1
    };
    const observer = new IntersectionObserver((entries, observer) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          observer.unobserve(entry.target);
        }
      });
    }, observerOptions);
    sectionsToAnimate.forEach(section => {
      observer.observe(section);
    });

    // Update Cart Counter
    const updateCartCounter = () => {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      const counter = document.getElementById('cart-counter');
      if (totalItems > 0) {
        counter.textContent = totalItems;
        counter.classList.remove('hidden');
      } else {
        counter.classList.add('hidden');
      }
    };

    // Load Site Data (Menu & Footer)
    const loadSiteData = () => {
      fetch('site-data.json')
        .then(response => response.json())
        .then(data => {
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
          // Populate Header Menu
          const navMenu = document.getElementById('main-nav');
          data.headerMenu.forEach(item => {
          const isActive = item.href === currentPage;
          const activeClasses = isActive ? 'border-b-2 border-indigo-600' : '';
          navMenu.innerHTML += `<a href="${item.href}" class="block md:inline hover:text-indigo-600 transition-colors py-2 ${activeClasses}">${item.text}</a>`;
          });

          // Populate Footer Categories
          const footerCategories = document.getElementById('footer-categories');
          data.footer.categorias.forEach(item => {
            footerCategories.innerHTML += `<li><a href="${item.href}" class="hover:text-white">${item.text}</a></li>`;
          });

          // Populate Footer Support
          const footerSupport = document.getElementById('footer-support');
          data.footer.suporte.forEach(item => {
            footerSupport.innerHTML += `<li><a href="${item.href}" class="hover:text-white">${item.text}</a></li>`;
          });
        }).catch(error => console.error('Erro ao carregar dados do site:', error));
    };

    // Load Product Details
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const productId = parseInt(params.get('id'));
      const container = document.getElementById('product-details-container');
      const addToCartButton = document.getElementById('add-to-cart-btn');

      if (!productId) {
        container.innerHTML = '<p class="text-center text-red-500 text-lg">Produto não encontrado. ID inválido.</p>';
        document.getElementById('related-products-section').style.display = 'none';
        return;
      }

      fetch('products.json')
        .then(response => response.json())
        .then(products => {
          const product = products.find(p => p.id === productId);

          if (!product) {
            container.innerHTML = '<p class="text-center text-red-500 text-lg">Produto não encontrado.</p>';
            document.getElementById('related-products-section').style.display = 'none';
            return;
          }

          // Populate product info
          document.title = `${product.nome} - FashionStore`;
          document.getElementById('product-name').textContent = product.nome;
          document.getElementById('product-description').textContent = product.descricao;
          document.getElementById('product-stock').textContent = `Em estoque: ${product.estoque} unidades`;

          // Populate price
          const priceContainer = document.getElementById('product-price');
          if (product.promocao.ativo) {
            priceContainer.innerHTML = `
              <span class="text-gray-500 line-through mr-2">R$ ${product.preco.toFixed(2).replace('.', ',')}</span>
              <span class="text-indigo-600">R$ ${product.promocao.preco_promocional.toFixed(2).replace('.', ',')}</span>
            `;
          } else {
            priceContainer.innerHTML = `<span class="text-indigo-600">R$ ${product.preco.toFixed(2).replace('.', ',')}</span>`;
          }

          // Populate image gallery
          const mainImagesContainer = document.getElementById('product-main-images');
          const thumbImagesContainer = document.getElementById('product-thumb-images');
          product.imagens_galeria.forEach((imgUrl, index) => {
            mainImagesContainer.innerHTML += `
              <div class="swiper-slide">
                <img src="${imgUrl}" alt="${product.nome} - vista ${index + 1}" class="w-full h-80 md:h-96 object-cover">
              </div>`;
            thumbImagesContainer.innerHTML += `
              <div class="swiper-slide border-2 border-transparent rounded-lg cursor-pointer opacity-75 hover:opacity-100 transition-opacity">
                <img src="${imgUrl}" alt="${product.nome} - thumbnail ${index + 1}" class="w-full h-24 object-cover rounded-lg">
              </div>`;
          });

          // Initialize Swipers
          var productThumbSlider = new Swiper(".product-thumb-slider", {
            spaceBetween: 10,
            freeMode: true,
            watchSlidesProgress: true,
            breakpoints: {
              320: { slidesPerView: 3 },
              480: { slidesPerView: 4 },
              640: { slidesPerView: 4 },
            }
          });
          new Swiper(".product-main-slider", {
            spaceBetween: 10,
            navigation: {
              nextEl: ".product-main-slider .swiper-button-next",
              prevEl: ".product-main-slider .swiper-button-prev",
            },
            thumbs: {
              swiper: productThumbSlider,
            },
          });

          // Populate size options
          if (product.opcoes && product.opcoes.tamanhos && product.opcoes.tamanhos.length > 0) {
            const sizeContainer = document.getElementById('size-option-container');
            const sizeSelect = document.getElementById('size-select');
            sizeContainer.classList.remove('hidden');
            sizeSelect.innerHTML = '<option>Selecione um tamanho</option>';
            product.opcoes.tamanhos.forEach(size => {
              sizeSelect.innerHTML += `<option>${size}</option>`;
            });
          }

          // Populate related products
          const relatedProductsContainer = document.getElementById('related-products-list');
          const relatedProducts = products.filter(p => p.categoria === product.categoria && p.id !== product.id).slice(0, 4);

          if (relatedProducts.length > 0) {
            relatedProducts.forEach(related => {
              const productCard = document.createElement('a');
              productCard.href = `product-details.html?id=${related.id}`;
              productCard.className = 'block bg-white rounded-xl p-4 shadow hover:shadow-lg transition-shadow';

              const priceHtml = related.promocao.ativo
                ? `
                  <p class="text-sm text-gray-500 line-through">
                    R$ ${related.preco.toFixed(2).replace('.', ',')}
                  </p>
                  <p class="text-indigo-600 font-bold">
                    R$ ${related.promocao.preco_promocional.toFixed(2).replace('.', ',')}
                  </p>
                `
                : `
                  <p class="text-indigo-600 font-bold">
                    R$ ${related.preco.toFixed(2).replace('.', ',')}
                  </p>
                `;

              productCard.innerHTML = `
                <img src="${related.imagem_principal}" alt="${related.nome}" class="rounded-lg mb-4 w-full h-48 object-cover">
                <h4 class="font-semibold text-lg">
                  ${related.nome}
                </h4>
                ${priceHtml}
                <button class="mt-3 w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition-colors">
                  Ver detalhes
                </button>
              `;
              relatedProductsContainer.appendChild(productCard);
            });
          } else {
            document.getElementById('related-products-section').style.display = 'none';
          }

        })
        .catch(error => {
          console.error('Erro ao carregar os detalhes do produto:', error);
          container.innerHTML = '<p class="text-center text-red-500 text-lg">Erro ao carregar o produto. Tente novamente mais tarde.</p>';
          document.getElementById('related-products-section').style.display = 'none';
        });

      // Add to Cart Logic
      addToCartButton.addEventListener('click', () => {
        fetch('products.json')
          .then(res => res.json())
          .then(products => {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            const quantity = parseInt(document.getElementById('quantity').value);
            const sizeSelect = document.getElementById('size-select');
            const size = sizeSelect.value !== 'Selecione um tamanho' ? sizeSelect.value : null;

            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            // Check if item with same id and size already exists
            const existingItemIndex = cart.findIndex(item => item.id === product.id && item.size === size);

            if (existingItemIndex > -1) {
              // If exists, just update the quantity
              cart[existingItemIndex].quantity += quantity;
            } else {
              // If not, add as a new item
              const cartItem = {
                id: product.id,
                name: product.nome,
                price: product.promocao.ativo ? product.promocao.preco_promocional : product.preco,
                image: product.imagem_principal,
                quantity: quantity,
                size: size
              };
              cart.push(cartItem);
            }

            localStorage.setItem('cart', JSON.stringify(cart));

            // Redirect to cart page
            window.location.href = 'cart.html';
          });
      });

      loadSiteData();
      updateCartCounter();
    });
  </script>

  <script>
    // Search Overlay Logic
    const openSearchBtn = document.getElementById('open-search-btn');
    const closeSearchBtn = document.getElementById('close-search-btn');
    const searchOverlay = document.getElementById('search-overlay');
    const searchInput = document.getElementById('search-input');
    const searchSubmitBtn = document.getElementById('search-submit-btn');

    const performSearch = () => {
      const query = searchInput.value.trim();
      if (query) {
        window.location.href = `index.html?search=${encodeURIComponent(query)}`;
      }
    };

    openSearchBtn.addEventListener('click', () => {
      searchOverlay.classList.remove('hidden');
      searchOverlay.classList.add('flex');
      searchInput.focus();
    });

    closeSearchBtn.addEventListener('click', () => {
      searchOverlay.classList.add('hidden');
      searchOverlay.classList.remove('flex');
    });

    searchSubmitBtn.addEventListener('click', performSearch);
    searchInput.addEventListener('keyup', (e) => {
      if (e.key === 'Enter') performSearch();
    });
  </script>

  <script>
    // Back to top button logic
    const backToTopButton = document.getElementById('back-to-top-btn');

    window.addEventListener('scroll', () => {
      if (window.scrollY > 300) {
        backToTopButton.classList.add('show');
      } else {
        backToTopButton.classList.remove('show');
      }
    });

    backToTopButton.addEventListener('click', () => {
      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    });
  </script>
</body>
</html>
